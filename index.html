<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/prf-vanilla/svg/shield.svg" />
  <title>SIGEP PRF - Gestão Integrada Vanilla</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&family=Sora:wght@700;800&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Config directly via CDN Script -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sora: ['Sora', 'sans-serif'],
            sans: ['"IBM Plex Sans"', 'sans-serif']
          },
          animation: {
            'fade-in': 'fadeIn 0.4s ease-out forwards',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(5px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/styles.css" />
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Chart.js (substituindo Recharts) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-[#F0F3F7] min-h-screen font-sans antialiased text-[#0D2137]">
  
  <!-- Root Container for our Vanilla JS App -->
  <div id="root" class="flex flex-col md:flex-row min-h-screen overflow-hidden">
     <!-- App Loading State -->
     <div class="fixed inset-0 flex items-center justify-center bg-white z-[99]">
         <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-[#0D2137]"></div>
         <span class="ml-3 font-bold text-[#0D2137]">Inicializando Sistema...</span>
     </div>
  </div>

  <!-- Error Interceptor -->
  <script>
    window.onload = () => { setTimeout(() => { if(document.getElementById('root') && document.getElementById('root').innerHTML.includes('Inicializando')) { document.getElementById('root').innerHTML = '<div style="color:red;padding:20px;font-family:sans-serif"><h1>ALERTA DETECTIVE!</h1><p>Sistema preso no Carregamento por timeout. Funções não executaram. Verifique os módulos.</p></div>'; } }, 3000); };
    window.onerror = function(msg, url, line, col, error) {
       document.getElementById('root').innerHTML = '<div style="background:red;color:white;padding:20px;font-family:monospace;z-index:99999;position:fixed;inset:0"><h1>RUNTIME CRASH!</h1><p>' + msg + '</p><p>Line: ' + line + ':' + col + '</p><pre>' + (error && error.stack ?error.stack : 'No stack') + '</pre></div>';
       return false;
    };
    window.onunhandledrejection = function(event) {
       document.getElementById('root').innerHTML = '<div style="background:orange;color:white;padding:20px;font-family:monospace;z-index:99999;position:fixed;inset:0"><h1>UNHANDLED PROMISE TRAP!</h1><p>' + event.reason + '</p></div>';
    };
  </script>

  <!-- Main JavaScript Logic -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
